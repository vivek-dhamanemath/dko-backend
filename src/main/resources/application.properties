spring.application.name=developer-knowledge-organizer

server.port=${PORT:8081}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dko}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JWT Configuration — set JWT_SECRET env variable in production (min 32 chars)
jwt.secret=${JWT_SECRET:dko-dev-secret-key-change-in-production-minimum-32-chars}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging configurations
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.file.name=backend.log

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.application.name=developer-knowledge-organizer

server.port=${PORT:8081}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dko}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Supabase JWT validation via JWKS (ECC P-256 keys)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI:https://zzekdqzhuijkjhvjzwed.supabase.co/auth/v1/.well-known/jwks.json}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging configurations
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.file.name=backend.log

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
